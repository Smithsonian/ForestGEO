# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: ForestGEO Live Site Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-app-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4.0.4
        with:
          node-version: '24.x'

      - name: create env file (in frontend/ directory) -- production
        id: create-env-file-prod
        run: |
          touch frontend/.env
          echo AUTH_MICROSOFT_ENTRA_ID_SECRET=${{ secrets.AZURE_AD_CLIENT_SECRET_PRODUCTION }} >> frontend/.env
          echo AUTH_MICROSOFT_ENTRA_ID_ID=${{ secrets.AZURE_AD_CLIENT_ID_PRODUCTION }} >> frontend/.env
          echo AUTH_MICROSOFT_ENTRA_ID_ISSUER=${{ secrets.AZURE_AD_TENANT_ID_PRODUCTION }} >> frontend/.env
          echo AUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} >> frontend/.env
          echo AUTH_URL=${{ secrets.AUTH_URL }} >> frontend/.env
          echo AUTH_FUNCTIONS_POLL_URL=${{ secrets.AUTH_FUNCTIONS_POLL_URL }} >> frontend/.env
          echo AZURE_SQL_USER=${{ secrets.AZURE_SQL_USER }} >> frontend/.env
          echo AZURE_SQL_PASSWORD=${{ secrets.AZURE_SQL_PASSWORD }} >> frontend/.env
          echo AZURE_SQL_SERVER=${{ secrets.AZURE_SQL_SERVER }} >> frontend/.env
          echo AZURE_SQL_DATABASE=${{ secrets.AZURE_SQL_DATABASE }} >> frontend/.env
          echo AZURE_SQL_PORT=${{ secrets.AZURE_SQL_PORT }} >> frontend/.env
          echo AZURE_STORAGE_SAS_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_SAS_CONNECTION_STRING }} >> frontend/.env
          echo AZURE_SQL_SCHEMA=${{ secrets.AZURE_SQL_SCHEMA }} >> frontend/.env
          echo AZURE_SQL_CATALOG_SCHEMA=${{ secrets.AZURE_SQL_CATALOG_SCHEMA }} >> frontend/.env
          echo AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }} >> frontend/.env
          echo APP_INSIGHTS_CONNECTION_STRING=${{ secrets.APP_INSIGHTS_CONNECTION_STRING }} >> frontend/.env
          echo NEXTAUTH_DEBUG=true >> frontend/.env
          echo NODE_ENV=production >> frontend/.env
          echo NEXT_RUNTIME=nodejs >> frontend/.env
          echo OTEL_LOG_LEVEL=debug >> frontend/.env
          echo REACT_EDITOR=code >> frontend/.env
          echo PORT=3000 >> frontend/.env
          echo FG_PAT=${{ secrets.FG_PAT }} >> frontend/.env
          echo OWNER=${{ secrets.OWNER }} >> frontend/.env
          echo REPO=${{ secrets.REPO }} >> frontend/.env

#      - name: Cache node modules
#        uses: actions/cache@v2
#        with:
#          path: frontend/node_modules
#          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
#          restore-keys: |
#            ${{ runner.os }}-node-
#
#      - name: Cache Next.js build
#        uses: actions/cache@v2
#        with:
#          path: frontend/.next/cache
#          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/.next/cache') }}
#          restore-keys: |
#            ${{ runner.os }}-next-
#            ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}

      - name: move into frontend --> npm install, build, and test
        run: |
          cd frontend/
          npm install
          npm run build
          npm run test --if-present

      - name: Move directories into build/standalone to reduce app load
        run: |
          mv ./frontend/build/static ./frontend/build/standalone/build
          mv ./frontend/public ./frontend/build/standalone

      - name: Verify build integrity
        id: verify-build
        run: |
          cd frontend/build/standalone

          # Check BUILD_ID exists
          if [ ! -f "build/BUILD_ID" ]; then
            echo "::error::BUILD_ID file not found"
            exit 1
          fi
          BUILD_ID=$(cat build/BUILD_ID)
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "✅ Build ID: $BUILD_ID"

          # Check build manifest exists
          if [ ! -f "build/build-manifest.json" ]; then
            echo "::error::build-manifest.json not found"
            exit 1
          fi
          echo "✅ Build manifest present"

          # Check server chunks exist and count them
          CHUNK_COUNT=$(ls build/server/chunks/*.js 2>/dev/null | wc -l | tr -d '[:space:]')
          if [ "$CHUNK_COUNT" -lt 10 ]; then
            echo "::error::Insufficient server chunks found: $CHUNK_COUNT (expected 10+)"
            exit 1
          fi
          echo "chunk_count=$CHUNK_COUNT" >> $GITHUB_OUTPUT
          echo "✅ Server chunks: $CHUNK_COUNT files"

          # Check static directory exists
          if [ ! -d "build/static" ]; then
            echo "::error::Static assets directory not found"
            exit 1
          fi
          echo "✅ Static assets present"

          # Check server.js exists
          if [ ! -f "server.js" ]; then
            echo "::error::server.js not found"
            exit 1
          fi
          echo "✅ server.js present"

          echo "✅ Build integrity verification passed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: frontend/build/standalone

  deploy-app-production:
    needs: build-app-production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: frontend/build/standalone

      - name: 'Deploy to Azure Web App (main)'
        id: deploy-to-webapp-main
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'forestgeo-livesite'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_PRODUCTION }}
          package: frontend/build/standalone

      - name: Wait for deployment to stabilize
        run: |
          echo "Waiting 30 seconds for Azure to restart the app..."
          sleep 30

      - name: Verify deployment health
        id: health-check
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=15
          HEALTH_URL="https://forestgeo-livesite.azurewebsites.net/api/health"

          echo "🏥 Starting deployment health verification..."
          echo "Health endpoint: $HEALTH_URL"

          for i in $(seq 1 $MAX_RETRIES); do
            echo ""
            echo "Attempt $i of $MAX_RETRIES..."

            # Make request and capture both status code and body
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" "$HEALTH_URL" --max-time 30 || printf "\n000")
            HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
            HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1 | tr -d '[:space:]')

            echo "HTTP Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              echo "$HTTP_BODY" | jq . 2>/dev/null || echo "$HTTP_BODY"

              # Extract and verify build info
              DEPLOYED_BUILD_ID=$(echo "$HTTP_BODY" | jq -r '.build.id // empty' 2>/dev/null)
              HEALTH_STATUS=$(echo "$HTTP_BODY" | jq -r '.status // empty' 2>/dev/null)
              CHUNK_COUNT=$(echo "$HTTP_BODY" | jq -r '.build.chunkCount // 0' 2>/dev/null)

              echo ""
              echo "📊 Deployment Summary:"
              echo "   Build ID: $DEPLOYED_BUILD_ID"
              echo "   Health Status: $HEALTH_STATUS"
              echo "   Server Chunks: $CHUNK_COUNT"

              if [ "$HEALTH_STATUS" = "healthy" ]; then
                echo ""
                echo "✅ Deployment verified successfully!"
                echo "health_status=healthy" >> $GITHUB_OUTPUT
                exit 0
              elif [ "$HEALTH_STATUS" = "degraded" ]; then
                echo "⚠️ Deployment is degraded but functional"
                echo "health_status=degraded" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "❌ Health status is unhealthy: $HEALTH_STATUS"
              fi
            elif [ "$HTTP_STATUS" = "503" ]; then
              echo "⚠️ Service unavailable (503) - deployment may still be starting..."
              echo "$HTTP_BODY" | jq . 2>/dev/null || echo "$HTTP_BODY"
            elif [ "$HTTP_STATUS" = "000" ]; then
              echo "⚠️ Connection failed - server may still be restarting..."
            else
              echo "⚠️ Unexpected status code: $HTTP_STATUS"
              echo "$HTTP_BODY"
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done

          echo ""
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "health_status=failed" >> $GITHUB_OUTPUT
          exit 1

      - name: Setup Node.js for validation deployment
        uses: actions/setup-node@v4.0.4
        with:
          node-version: '24.x'

      - name: Checkout code for validation deployment
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Deploy validation queries to all schemas
        env:
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          cd repo/frontend
          npm install --production=false
          npx tsx scripts/deploy-validations-to-all-schemas.ts
        continue-on-error: false

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Fetch notification recipients
        id: get_recipients
        env:
          DB_HOST: ${{ secrets.AZURE_SQL_SERVER }}
          DB_USER: ${{ secrets.AZURE_SQL_USER }}
          DB_PASS: ${{ secrets.AZURE_SQL_PASSWORD }}
          DB_NAME: ${{ secrets.AZURE_SQL_DATABASE }}
        run: |
          # grab only the email column, one per line, no headers
          EMAILS=$(mysql --batch --skip-column-names \
            -h "$DB_HOST" \
            -u "$DB_USER" \
            -p"$DB_PASS" \
            -D "$DB_NAME" \
            -e "SELECT Email FROM catalog.users WHERE Notifications IS TRUE;" \
            | paste -sd "," -)
          echo "emails=$EMAILS" >> $GITHUB_OUTPUT

      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect merged commit messages
        id: collect_messages
        run: |
          # Handle case where github.event.before might not exist or be invalid
          if git rev-parse --verify ${{ github.event.before }} >/dev/null 2>&1; then
            # Check if we can create a valid range (before should be ancestor of current)
            if git merge-base --is-ancestor ${{ github.event.before }} ${{ github.sha }} 2>/dev/null; then
              MESSAGES=$(git log --no-merges \
              --format='- %s' \
              ${{ github.event.before }}..${{ github.sha }})
            else
              # If before is not an ancestor, just get the current commit
              MESSAGES=$(git log --no-merges \
              --format='- %s' \
              -1 ${{ github.sha }})
            fi
          else
            # Fallback to just the current commit if before SHA is invalid
            MESSAGES=$(git log --no-merges \
            --format='- %s' \
            -1 ${{ github.sha }})
          fi

          echo "messages<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send deployment notification
        if: ${{ success() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.NOTIFS_EMAIL_SOURCE }}
          password: ${{ secrets.NOTIFS_EMAIL_PWD }}
          secure: false

          from: "ForestGEO Automated Notifications <${{ secrets.NOTIFS_EMAIL_SOURCE }}>"
          to: ${{ steps.get_recipients.outputs.emails }}

          # subject & body
          subject: "🚀 Deployment to ${{ github.ref_name }} succeeded"
          body: |
            Hello ForestGEO Users,

            The branch `${{ github.ref_name }}` was just deployed successfully! 
            Please review the following commit details for more information:

            • Commit SHA: `${{ github.sha }}`
            • Commit message:
              > ${{ steps.collect_messages.outputs.messages }}

            Cheers,
            GitHub Actions

  # Rollback job - attempts to restore previous deployment on health check failure
  # Only runs if deploy job failed (not if build failed)
  # Requires AZURE_CREDENTIALS secret to be configured for az CLI commands
  rollback-on-failure:
    if: failure() && needs.deploy-app-production.result == 'failure'
    needs: [build-app-production, deploy-app-production]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true  # Gracefully handle missing credentials

      - name: Attempt rollback to previous deployment
        id: rollback
        run: |
          echo "🔄 Attempting to rollback to previous deployment..."

          # Try to restart the app to recover from bad state
          az webapp restart --name forestgeo-livesite --resource-group ForestGEO-ResourceGroup || true

          echo "⏳ Waiting 60 seconds for app to restart..."
          sleep 60

          # Check if restart helped
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://forestgeo-livesite.azurewebsites.net/api/health" --max-time 30 || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ App recovered after restart"
            echo "rollback_status=recovered" >> $GITHUB_OUTPUT
          else
            echo "❌ App still unhealthy after restart (status: $HTTP_STATUS)"
            echo "rollback_status=failed" >> $GITHUB_OUTPUT
            echo "::warning::Manual intervention may be required!"
          fi
        continue-on-error: true

      - name: Create rollback issue
        if: steps.rollback.outputs.rollback_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 URGENT: Production Deployment Health Check Failed - Manual Intervention Required',
              body: `## Production Deployment Failure Alert

              **Time**: ${new Date().toISOString()}
              **Branch**: ${{ github.ref_name }}
              **Commit**: ${{ github.sha }}
              **Workflow Run**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

              ### What Happened
              The production deployment health check failed and automatic recovery was unsuccessful.

              ### Recommended Actions
              1. Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              2. Review the health endpoint: https://forestgeo-livesite.azurewebsites.net/api/health
              3. Check Azure Portal for the app service status
              4. Consider rolling back manually via Azure Portal (Deployment Center → Deployment Logs)

              ### Manual Rollback Steps
              \`\`\`bash
              # Using Azure CLI
              az webapp deployment slot swap -g ForestGEO-ResourceGroup -n forestgeo-livesite --slot staging --target-slot production
              # Or restart the app
              az webapp restart -g ForestGEO-ResourceGroup -n forestgeo-livesite
              \`\`\`

              /cc @${{ github.actor }}`,
              labels: ['urgent', 'deployment-failure', 'production', 'automated']
            });
        continue-on-error: true

  # Notification job - sends email when build or deploy fails
  # Waits for rollback attempt to complete (if any) before sending notification
  # The 'always()' ensures this runs even when rollback-on-failure is skipped
  notify-failure:
    if: always() && (needs.build-app-production.result == 'failure' || needs.deploy-app-production.result == 'failure')
    needs: [build-app-production, deploy-app-production, rollback-on-failure]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code for failure analysis
        uses: actions/checkout@v4

      - name: Collect failure information
        id: failure_info
        run: |
          echo "workflow_run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "workflow_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "build_status=${{ needs.build-app-production.result }}" >> $GITHUB_OUTPUT
          echo "deploy_status=${{ needs.deploy-app-production.result }}" >> $GITHUB_OUTPUT
          echo "rollback_status=${{ needs.rollback-on-failure.result }}" >> $GITHUB_OUTPUT

          # Determine which job failed
          if [[ "${{ needs.build-app-production.result }}" == "failure" ]]; then
            echo "failed_job=build-app-production" >> $GITHUB_OUTPUT
            echo "failure_stage=Build" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy-app-production.result }}" == "failure" ]]; then
            echo "failed_job=deploy-app-production" >> $GITHUB_OUTPUT
            echo "failure_stage=Deployment/Health Check" >> $GITHUB_OUTPUT
          else
            echo "failed_job=unknown" >> $GITHUB_OUTPUT
            echo "failure_stage=Unknown" >> $GITHUB_OUTPUT
          fi

      - name: Get commit information
        id: commit_info
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an <%ae>')
          echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT

      - name: Send failure notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.NOTIFS_EMAIL_SOURCE }}
          password: ${{ secrets.NOTIFS_EMAIL_PWD }}
          secure: false

          from: "ForestGEO Automated Notifications <${{ secrets.NOTIFS_EMAIL_SOURCE }}>"
          to: ${{ secrets.DEVELOPER_EMAIL }}

          subject: "❌ ForestGEO Production Deployment Failed - ${{ steps.failure_info.outputs.failure_stage }} Error on ${{ steps.failure_info.outputs.branch_name }}"
          body: |
            Hello,

            The ForestGEO production deployment pipeline has failed during the ${{ steps.failure_info.outputs.failure_stage }} stage.

            ## Failure Details
            • **Failed Job**: ${{ steps.failure_info.outputs.failed_job }}
            • **Branch**: ${{ steps.failure_info.outputs.branch_name }}
            • **Commit SHA**: ${{ steps.failure_info.outputs.commit_sha }}
            • **Build Status**: ${{ steps.failure_info.outputs.build_status }}
            • **Deploy Status**: ${{ steps.failure_info.outputs.deploy_status }}
            • **Rollback Attempted**: ${{ steps.failure_info.outputs.rollback_status }}

            ## Commit Information
            • **Message**: ${{ steps.commit_info.outputs.commit_message }}
            • **Author**: ${{ steps.commit_info.outputs.commit_author }}

            ## Health Check Status
            Check the deployment health endpoint directly:
            https://forestgeo-livesite.azurewebsites.net/api/health

            ## Debugging Information
            • **Workflow Run**: ${{ steps.failure_info.outputs.workflow_url }}
            • **Run ID**: ${{ steps.failure_info.outputs.workflow_run_id }}

            ## Next Steps
            1. Check the workflow logs at the URL above
            2. Review the health check output for specific failure reasons
            3. Look for error messages in the specific step that failed
            4. Common failure points:
               - Build integrity: Missing webpack chunks or manifest files
               - Health check: Server failed to start or missing environment variables
               - Deploy failures: Azure credentials, app service configuration issues

            ## Manual Recovery Options
            - Restart app: az webapp restart -g ForestGEO-ResourceGroup -n forestgeo-livesite
            - View Azure logs: Azure Portal → App Services → forestgeo-livesite → Log stream
            - Re-run workflow: ${{ steps.failure_info.outputs.workflow_url }}

            ## Quick Actions
            - View logs: ${{ steps.failure_info.outputs.workflow_url }}
            - Repository: https://github.com/${{ github.repository }}
            - Commit: https://github.com/${{ github.repository }}/commit/${{ steps.failure_info.outputs.commit_sha }}

            This is an automated notification sent only to the developer operating this codebase.

            Best regards,
            GitHub Actions