name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # E2E runs against a throwaway MySQL service container seeded by
    # tests/setup/e2e-seed.ts — never an external/Azure database. This keeps the
    # gate hermetic: no secrets, no firewall allow-lists, no shared-state flakes.
    services:
      mysql:
        image: mysql:8.0.36
        env:
          MYSQL_ROOT_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Create .env for E2E testing
        run: |
          cat > frontend/.env <<'ENVEOF'
          AUTH_SECRET=e2e-ci-secret
          AUTH_URL=http://localhost:3000
          AZURE_SQL_USER=root
          AZURE_SQL_PASSWORD=testpassword
          AZURE_SQL_SERVER=127.0.0.1
          AZURE_SQL_PORT=3306
          AZURE_SQL_CATALOG_SCHEMA=catalog
          NEXT_PUBLIC_E2E_TESTING=true
          NODE_ENV=development
          PORT=3000
          ENVEOF

      - name: Install dependencies
        run: cd frontend && npm install

      # The mysql service `--health-cmd` gates steps until MySQL is healthy, and
      # the seed's own connectWithRetry covers any residual TCP race.
      - name: Seed E2E database
        run: cd frontend && npm run db:seed:e2e
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: '3306'
          TEST_DB_USER: root
          TEST_DB_PASSWORD: testpassword

      - name: Install Cypress binary
        run: cd frontend && npx cypress install

      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npx next dev --turbo
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome
          headed: false
          spec: cypress/e2e/census-creation.cy.ts
        env:
          NEXT_PUBLIC_E2E_TESTING: 'true'

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          retention-days: 7

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
          retention-days: 7
          if-no-files-found: ignore
