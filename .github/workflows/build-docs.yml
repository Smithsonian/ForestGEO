name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
      - development
    paths:
      - "frontend/docs/**"
  workflow_dispatch:
    inputs:
      operation:
        description: "Manual DB action: migrate or inspect_species_duplicates"
        required: false
        default: "migrate"
      target_schemas:
        description: "Space-separated schema list for manual DB action"
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/docs/package-lock.json

      - name: Install dependencies
        working-directory: frontend/docs
        run: npm ci

      - name: Build documentation
        working-directory: frontend/docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/docs/dist

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  live-schema-migrations:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: development_temp
    timeout-minutes: 120

    env:
      AZURE_SQL_SERVER: forestgeo-mysqldataserver.mysql.database.azure.com
      AZURE_SQL_PORT: 3306
      AZURE_SQL_USER: azureroot
      AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      DEFAULT_TARGET_SCHEMAS: forestgeo_harvard forestgeo_mpala forestgeo_ngel_nyaki forestgeo_panama forestgeo_rabi forestgeo_serc
      INPUT_TARGET_SCHEMAS: ${{ github.event.inputs.target_schemas }}
      INPUT_OPERATION: ${{ github.event.inputs.operation }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-client

      - name: Resolve manual migration inputs
        id: resolve_inputs
        run: |
          set -euo pipefail

          operation="${INPUT_OPERATION:-migrate}"
          target_schemas="${INPUT_TARGET_SCHEMAS:-}"

          if [[ -z "$target_schemas" ]]; then
            target_schemas="$DEFAULT_TARGET_SCHEMAS"
          fi

          echo "operation=$operation" >> "$GITHUB_OUTPUT"
          echo "target_schemas=$target_schemas" >> "$GITHUB_OUTPUT"

          echo "Operation: $operation"
          echo "Target schemas: $target_schemas"

      - name: Inspect species duplicates
        if: steps.resolve_inputs.outputs.operation == 'inspect_species_duplicates'
        env:
          MYSQL_PWD: ${{ secrets.AZURE_SQL_PASSWORD }}
          TARGET_SCHEMAS: ${{ steps.resolve_inputs.outputs.target_schemas }}
        run: |
          set -euo pipefail

          REPORT_DIR="$GITHUB_WORKSPACE/migration-audit"
          mkdir -p "$REPORT_DIR"

          mysql_base=(mysql --ssl-mode=REQUIRED -h "$AZURE_SQL_SERVER" -P "$AZURE_SQL_PORT" -u "$AZURE_SQL_USER" -N -B)
          read -r -a schemas <<< "$TARGET_SCHEMAS"

          {
            echo -e "schema\tspecies_code\tis_active\trow_count"
            for schema in "${schemas[@]}"; do
              "${mysql_base[@]}" -e "
                SELECT '${schema}' AS schema_name, SpeciesCode, IsActive, COUNT(*) AS row_count
                FROM \`${schema}\`.species
                GROUP BY SpeciesCode, IsActive
                HAVING COUNT(*) > 1
                ORDER BY SpeciesCode, IsActive;
              "
            done
          } | tee "$REPORT_DIR/species-duplicate-summary.tsv"

          {
            echo -e "schema\tspecies_code\tspecies_id\tis_active\ttree_refs\tspecieslimit_refs\tgenus_id\tspecies_name\tsubspecies_name\tid_level\tspecies_authority\tsubspecies_authority\tfield_family\tdescription\tvalid_code\tdeleted_at"
            for schema in "${schemas[@]}"; do
              "${mysql_base[@]}" -e "
                SELECT
                  '${schema}' AS schema_name,
                  s.SpeciesCode,
                  s.SpeciesID,
                  s.IsActive,
                  COALESCE(t.tree_refs, 0) AS tree_refs,
                  COALESCE(sl.specieslimit_refs, 0) AS specieslimit_refs,
                  COALESCE(s.GenusID, ''),
                  COALESCE(s.SpeciesName, ''),
                  COALESCE(s.SubspeciesName, ''),
                  COALESCE(s.IDLevel, ''),
                  COALESCE(s.SpeciesAuthority, ''),
                  COALESCE(s.SubspeciesAuthority, ''),
                  COALESCE(s.FieldFamily, ''),
                  COALESCE(s.Description, ''),
                  COALESCE(s.ValidCode, ''),
                  COALESCE(DATE_FORMAT(s.DeletedAt, '%Y-%m-%d %H:%i:%s'), '')
                FROM \`${schema}\`.species s
                INNER JOIN (
                  SELECT SpeciesCode, IsActive
                  FROM \`${schema}\`.species
                  GROUP BY SpeciesCode, IsActive
                  HAVING COUNT(*) > 1
                ) d
                  ON d.SpeciesCode <=> s.SpeciesCode
                 AND d.IsActive = s.IsActive
                LEFT JOIN (
                  SELECT SpeciesID, COUNT(*) AS tree_refs
                  FROM \`${schema}\`.trees
                  GROUP BY SpeciesID
                ) t
                  ON t.SpeciesID = s.SpeciesID
                LEFT JOIN (
                  SELECT SpeciesID, COUNT(*) AS specieslimit_refs
                  FROM \`${schema}\`.specieslimits
                  GROUP BY SpeciesID
                ) sl
                  ON sl.SpeciesID = s.SpeciesID
                ORDER BY s.SpeciesCode, s.IsActive DESC, s.SpeciesID;
              "
            done
          } | tee "$REPORT_DIR/species-duplicate-details.tsv"

          {
            echo -e "schema\tspecies_code\tcanonical_species_id\tduplicate_species_id\tduplicate_tree_rows\tcolliding_tree_rows"
            for schema in "${schemas[@]}"; do
              "${mysql_base[@]}" -e "
                SELECT
                  '${schema}' AS schema_name,
                  dup.SpeciesCode,
                  canon.canonical_species_id,
                  dup.SpeciesID AS duplicate_species_id,
                  COALESCE(dup_tree.total_duplicate_tree_rows, 0) AS duplicate_tree_rows,
                  COALESCE(collisions.colliding_tree_rows, 0) AS colliding_tree_rows
                FROM \`${schema}\`.species dup
                INNER JOIN (
                  SELECT SpeciesCode, MIN(SpeciesID) AS canonical_species_id
                  FROM \`${schema}\`.species
                  WHERE IsActive = 1
                  GROUP BY SpeciesCode
                  HAVING COUNT(*) > 1
                ) canon
                  ON canon.SpeciesCode <=> dup.SpeciesCode
                 AND dup.IsActive = 1
                 AND dup.SpeciesID <> canon.canonical_species_id
                LEFT JOIN (
                  SELECT SpeciesID, COUNT(*) AS total_duplicate_tree_rows
                  FROM \`${schema}\`.trees
                  GROUP BY SpeciesID
                ) dup_tree
                  ON dup_tree.SpeciesID = dup.SpeciesID
                LEFT JOIN (
                  SELECT
                    d.SpeciesID AS duplicate_species_id,
                    COUNT(*) AS colliding_tree_rows
                  FROM \`${schema}\`.species d
                  INNER JOIN (
                    SELECT SpeciesCode, MIN(SpeciesID) AS canonical_species_id
                    FROM \`${schema}\`.species
                    WHERE IsActive = 1
                    GROUP BY SpeciesCode
                    HAVING COUNT(*) > 1
                  ) c
                    ON c.SpeciesCode <=> d.SpeciesCode
                   AND d.IsActive = 1
                   AND d.SpeciesID <> c.canonical_species_id
                  INNER JOIN \`${schema}\`.trees t_dup
                    ON t_dup.SpeciesID = d.SpeciesID
                  INNER JOIN \`${schema}\`.trees t_can
                    ON t_can.SpeciesID = c.canonical_species_id
                   AND t_can.TreeTag <=> t_dup.TreeTag
                   AND t_can.CensusID <=> t_dup.CensusID
                  GROUP BY d.SpeciesID
                ) collisions
                  ON collisions.duplicate_species_id = dup.SpeciesID
                ORDER BY dup.SpeciesCode, dup.SpeciesID;
              "
            done
          } | tee "$REPORT_DIR/species-tree-collision-summary.tsv"

          {
            echo -e "schema\tspecies_code\tcanonical_species_id\tduplicate_species_id\tcanonical_tree_id\tduplicate_tree_id\ttree_tag\tcensus_id"
            for schema in "${schemas[@]}"; do
              "${mysql_base[@]}" -e "
                SELECT
                  '${schema}' AS schema_name,
                  d.SpeciesCode,
                  c.canonical_species_id,
                  d.SpeciesID AS duplicate_species_id,
                  t_can.TreeID AS canonical_tree_id,
                  t_dup.TreeID AS duplicate_tree_id,
                  COALESCE(t_dup.TreeTag, ''),
                  COALESCE(t_dup.CensusID, '')
                FROM \`${schema}\`.species d
                INNER JOIN (
                  SELECT SpeciesCode, MIN(SpeciesID) AS canonical_species_id
                  FROM \`${schema}\`.species
                  WHERE IsActive = 1
                  GROUP BY SpeciesCode
                  HAVING COUNT(*) > 1
                ) c
                  ON c.SpeciesCode <=> d.SpeciesCode
                 AND d.IsActive = 1
                 AND d.SpeciesID <> c.canonical_species_id
                INNER JOIN \`${schema}\`.trees t_dup
                  ON t_dup.SpeciesID = d.SpeciesID
                INNER JOIN \`${schema}\`.trees t_can
                  ON t_can.SpeciesID = c.canonical_species_id
                 AND t_can.TreeTag <=> t_dup.TreeTag
                 AND t_can.CensusID <=> t_dup.CensusID
                ORDER BY d.SpeciesCode, duplicate_tree_id;
              "
            done
          } | tee "$REPORT_DIR/species-tree-collision-details.tsv"

      - name: Audit live schemas before migration
        if: steps.resolve_inputs.outputs.operation == 'migrate'
        env:
          MYSQL_PWD: ${{ secrets.AZURE_SQL_PASSWORD }}
          TARGET_SCHEMAS: ${{ steps.resolve_inputs.outputs.target_schemas }}
        run: |
          set -euo pipefail

          REPORT_DIR="$GITHUB_WORKSPACE/migration-audit"
          mkdir -p "$REPORT_DIR"

          mysql_base=(mysql --ssl-mode=REQUIRED -h "$AZURE_SQL_SERVER" -P "$AZURE_SQL_PORT" -u "$AZURE_SQL_USER" -N -B)

          read -r -a schemas <<< "$TARGET_SCHEMAS"

          if [[ ${#schemas[@]} -eq 0 ]]; then
            echo "No target schemas configured."
            exit 1
          fi

          {
            echo "schema,missing_40_48,plot_name_dupes,census_plot_number_dupes,validation_name_dupes,stemtag_nulls,species_active_code_dupes,quadrat_active_name_dupes"
            for schema in "${schemas[@]}"; do
              log_table_exists=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM information_schema.TABLES
                WHERE TABLE_SCHEMA = '${schema}'
                  AND TABLE_NAME = '_migration_log';
              ")

              if [[ "$log_table_exists" == "1" ]]; then
                missing_count=$("${mysql_base[@]}" -e "
                  SELECT COUNT(*)
                  FROM (
                    SELECT '39_seed_ambiguous_reference_error_codes.sql' AS migration_file
                    UNION ALL SELECT '40_add_upload_session_mode.sql'
                    UNION ALL SELECT '41_add_plots_name_unique.sql'
                    UNION ALL SELECT '42_add_census_plot_number_unique.sql'
                    UNION ALL SELECT '43_add_sitespecificvalidations_name_unique.sql'
                    UNION ALL SELECT '44_stems_stemtag_not_null.sql'
                    UNION ALL SELECT '45_drop_redundant_personnel_full_index.sql'
                    UNION ALL SELECT '46_add_species_active_code_unique.sql'
                    UNION ALL SELECT '47_add_quadrats_active_name_unique.sql'
                    UNION ALL SELECT '48_refresh_bulkingestionprocess_ambiguous_reference_resolution.sql'
                  ) expected
                  LEFT JOIN \`${schema}\`._migration_log ml
                    ON ml.migration_file = expected.migration_file
                   AND ml.status = 'applied'
                  WHERE ml.migration_file IS NULL;
                ")
              else
                missing_count=10
              fi

              plot_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT PlotName
                  FROM \`${schema}\`.plots
                  GROUP BY PlotName
                  HAVING COUNT(*) > 1
                ) d;
              ")

              census_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT PlotID, PlotCensusNumber
                  FROM \`${schema}\`.census
                  GROUP BY PlotID, PlotCensusNumber
                  HAVING COUNT(*) > 1
                ) d;
              ")

              validation_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT ProcedureName
                  FROM \`${schema}\`.sitespecificvalidations
                  GROUP BY ProcedureName
                  HAVING COUNT(*) > 1
                ) d;
              ")

              stemtag_nulls=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM \`${schema}\`.stems
                WHERE StemTag IS NULL;
              ")

              species_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT SpeciesCode, IsActive
                  FROM \`${schema}\`.species
                  GROUP BY SpeciesCode, IsActive
                  HAVING COUNT(*) > 1
                ) d;
              ")

              quadrat_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT PlotID, QuadratName, IsActive
                  FROM \`${schema}\`.quadrats
                  GROUP BY PlotID, QuadratName, IsActive
                  HAVING COUNT(*) > 1
                ) d;
              ")

              echo "${schema},${missing_count},${plot_dupes},${census_dupes},${validation_dupes},${stemtag_nulls},${species_dupes},${quadrat_dupes}"
            done
          } | tee "$REPORT_DIR/precheck-summary.csv"

          if awk -F, 'NR > 1 && (($3 + 0) > 0 || ($4 + 0) > 0 || ($5 + 0) > 0 || ($7 + 0) > 0 || ($8 + 0) > 0) { found = 1 } END { exit(found ? 0 : 1) }' "$REPORT_DIR/precheck-summary.csv"; then
            echo "Blocking duplicate data detected in one or more schemas. See migration-audit/precheck-summary.csv."
            exit 1
          fi

      - name: Run unified migrations on live schemas
        if: steps.resolve_inputs.outputs.operation == 'migrate'
        env:
          MYSQL_PWD: ${{ secrets.AZURE_SQL_PASSWORD }}
          TARGET_SCHEMAS: ${{ steps.resolve_inputs.outputs.target_schemas }}
        run: |
          set -euo pipefail

          REPORT_DIR="$GITHUB_WORKSPACE/migration-audit"
          LOG_DIR="$REPORT_DIR/logs"
          mkdir -p "$LOG_DIR"
          echo "schema,status" > "$REPORT_DIR/migration-results.csv"

          read -r -a schemas <<< "$TARGET_SCHEMAS"

          for schema in "${schemas[@]}"; do
            echo "=== Running unified migrations for ${schema} ==="
            log_file="$LOG_DIR/${schema}.log"

            if frontend/db-migrations/unified-measurements-migrations/run-branch-refresh.sh \
              "$schema" \
              --host "$AZURE_SQL_SERVER" \
              --user "$AZURE_SQL_USER" \
              --port "$AZURE_SQL_PORT" | tee "$log_file"; then
              echo "${schema},success" >> "$REPORT_DIR/migration-results.csv"
            else
              echo "${schema},failed" >> "$REPORT_DIR/migration-results.csv"
              exit 1
            fi
          done

      - name: Upload migration audit and backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-schema-migration-audit
          path: |
            migration-audit
            frontend/db-migrations/unified-measurements-migrations/backups
