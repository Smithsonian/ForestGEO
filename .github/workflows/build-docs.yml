name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
      - development
    paths:
      - "frontend/docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/docs/package-lock.json

      - name: Install dependencies
        working-directory: frontend/docs
        run: npm ci

      - name: Build documentation
        working-directory: frontend/docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/docs/dist

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  live-schema-migrations:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: development_temp
    timeout-minutes: 120

    env:
      AZURE_SQL_SERVER: forestgeo-mysqldataserver.mysql.database.azure.com
      AZURE_SQL_PORT: 3306
      AZURE_SQL_USER: azureroot
      AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      TARGET_SCHEMAS: >-
        forestgeo_harvard
        forestgeo_mpala
        forestgeo_ngel_nyaki
        forestgeo_panama
        forestgeo_rabi
        forestgeo_serc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-client

      - name: Audit live schemas before migration
        env:
          MYSQL_PWD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          set -euo pipefail

          REPORT_DIR="$GITHUB_WORKSPACE/migration-audit"
          mkdir -p "$REPORT_DIR"

          mysql_base=(mysql --ssl-mode=REQUIRED -h "$AZURE_SQL_SERVER" -P "$AZURE_SQL_PORT" -u "$AZURE_SQL_USER" -N -B)

          read -r -a schemas <<< "$TARGET_SCHEMAS"

          if [[ ${#schemas[@]} -eq 0 ]]; then
            echo "No target schemas configured."
            exit 1
          fi

          {
            echo "schema,missing_40_48,plot_name_dupes,census_plot_number_dupes,validation_name_dupes,stemtag_nulls,species_active_code_dupes,quadrat_active_name_dupes"
            for schema in "${schemas[@]}"; do
              log_table_exists=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM information_schema.TABLES
                WHERE TABLE_SCHEMA = '${schema}'
                  AND TABLE_NAME = '_migration_log';
              ")

              if [[ "$log_table_exists" == "1" ]]; then
                missing_count=$("${mysql_base[@]}" -e "
                  SELECT COUNT(*)
                  FROM (
                    SELECT '39_seed_ambiguous_reference_error_codes.sql' AS migration_file
                    UNION ALL SELECT '40_add_upload_session_mode.sql'
                    UNION ALL SELECT '41_add_plots_name_unique.sql'
                    UNION ALL SELECT '42_add_census_plot_number_unique.sql'
                    UNION ALL SELECT '43_add_sitespecificvalidations_name_unique.sql'
                    UNION ALL SELECT '44_stems_stemtag_not_null.sql'
                    UNION ALL SELECT '45_drop_redundant_personnel_full_index.sql'
                    UNION ALL SELECT '46_add_species_active_code_unique.sql'
                    UNION ALL SELECT '47_add_quadrats_active_name_unique.sql'
                    UNION ALL SELECT '48_refresh_bulkingestionprocess_ambiguous_reference_resolution.sql'
                  ) expected
                  LEFT JOIN \`${schema}\`._migration_log ml
                    ON ml.migration_file = expected.migration_file
                   AND ml.status = 'applied'
                  WHERE ml.migration_file IS NULL;
                ")
              else
                missing_count=10
              fi

              plot_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT PlotName
                  FROM \`${schema}\`.plots
                  GROUP BY PlotName
                  HAVING COUNT(*) > 1
                ) d;
              ")

              census_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT PlotID, PlotCensusNumber
                  FROM \`${schema}\`.census
                  GROUP BY PlotID, PlotCensusNumber
                  HAVING COUNT(*) > 1
                ) d;
              ")

              validation_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT ProcedureName
                  FROM \`${schema}\`.sitespecificvalidations
                  GROUP BY ProcedureName
                  HAVING COUNT(*) > 1
                ) d;
              ")

              stemtag_nulls=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM \`${schema}\`.stems
                WHERE StemTag IS NULL;
              ")

              species_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT SpeciesCode, IsActive
                  FROM \`${schema}\`.species
                  GROUP BY SpeciesCode, IsActive
                  HAVING COUNT(*) > 1
                ) d;
              ")

              quadrat_dupes=$("${mysql_base[@]}" -e "
                SELECT COUNT(*)
                FROM (
                  SELECT PlotID, QuadratName, IsActive
                  FROM \`${schema}\`.quadrats
                  GROUP BY PlotID, QuadratName, IsActive
                  HAVING COUNT(*) > 1
                ) d;
              ")

              echo "${schema},${missing_count},${plot_dupes},${census_dupes},${validation_dupes},${stemtag_nulls},${species_dupes},${quadrat_dupes}"
            done
          } | tee "$REPORT_DIR/precheck-summary.csv"

          if awk -F, 'NR > 1 && (($3 + 0) > 0 || ($4 + 0) > 0 || ($5 + 0) > 0 || ($7 + 0) > 0 || ($8 + 0) > 0) { found = 1 } END { exit(found ? 0 : 1) }' "$REPORT_DIR/precheck-summary.csv"; then
            echo "Blocking duplicate data detected in one or more schemas. See migration-audit/precheck-summary.csv."
            exit 1
          fi

      - name: Run unified migrations on live schemas
        env:
          MYSQL_PWD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          set -euo pipefail

          REPORT_DIR="$GITHUB_WORKSPACE/migration-audit"
          LOG_DIR="$REPORT_DIR/logs"
          mkdir -p "$LOG_DIR"
          echo "schema,status" > "$REPORT_DIR/migration-results.csv"

          read -r -a schemas <<< "$TARGET_SCHEMAS"

          for schema in "${schemas[@]}"; do
            echo "=== Running unified migrations for ${schema} ==="
            log_file="$LOG_DIR/${schema}.log"

            if frontend/db-migrations/unified-measurements-migrations/run-branch-refresh.sh \
              "$schema" \
              --host "$AZURE_SQL_SERVER" \
              --user "$AZURE_SQL_USER" \
              --port "$AZURE_SQL_PORT" | tee "$log_file"; then
              echo "${schema},success" >> "$REPORT_DIR/migration-results.csv"
            else
              echo "${schema},failed" >> "$REPORT_DIR/migration-results.csv"
              exit 1
            fi
          done

      - name: Upload migration audit and backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-schema-migration-audit
          path: |
            migration-audit
            frontend/db-migrations/unified-measurements-migrations/backups
